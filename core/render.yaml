services:
  - type: web
    name: atomhike-backend
    runtime: docker
    plan: free

    # No buildCommand/startCommand — Dockerfile handles everything

    healthCheckPath: /health

    envVars:
      # ── Database ─────────────────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false           # Set manually in Render dashboard (use Neon / Render Postgres URL)

      # ── JWT Auth ─────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure random secret

      - key: JWT_ALGORITHM
        value: HS256

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"

      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

      # ── Runtime ──────────────────────────────────────────────────────────────
      - key: ENVIRONMENT
        value: production

      - key: PYTHON_VERSION
        value: "3.11.0"
